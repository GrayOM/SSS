<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Code Analyzer</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="container">
    <h1>AI 기반 소스코드 취약점 분석 준비 도구</h1>
    <p>ZIP 파일을 업로드하면 분석 대상 파일 목록을 반환합니다.</p>

    <form id="upload-form">
      <input id="zip-file" type="file" accept=".zip" required />
      <button type="submit">업로드 및 분석</button>
    </form>

    <pre id="result"></pre>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
